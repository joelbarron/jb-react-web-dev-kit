name: Release

on:
  push:
    branches:
      - main
      - next

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Ensure npm supports trusted publishing
        run: |
          npm install -g npm@^11.5.1
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Verify publish payload
        run: npm run pack:verify

      - name: Version or Publish (stable)
        if: github.ref == 'refs/heads/main'
        uses: changesets/action@v1
        with:
          version: npm run release:version
          publish: npm run release:publish
          title: 'chore: release'
          commit: 'chore: release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Version or Publish (rc/next)
        if: github.ref == 'refs/heads/next'
        uses: changesets/action@v1
        with:
          version: npm run release:version
          publish: npm run release:publish:next
          title: 'chore: release (next)'
          commit: 'chore: release (next)'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
